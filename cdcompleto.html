<body>
<img class="fondo" src="img/fondo.jpg" alt="Fondo">
<div class="lista">🎵 Lista de Reproducción</div>
<div class="player">  <audio id="player" controls></audio></div>
<div class="botones">
    <hr>
    <button onclick="prevSong()">⏮ Anterior</button>
    <button onclick="playPause()">⏯ Reproducir/Pausar</button>
    <button onclick="nextSong()">⏭ Siguiente</button>
</div>

<ul id="playlist"></ul>

<script>
// Lista de canciones (URLs o rutas locales)
const songs = [
    { title: "Canción 1: La Patrulla Canina", file: "pistas_audio/01_La_Patrulla_Canina.mp3" },
    { title: "Canción 2: Antonio Rey Loot", file: "pistas_audio/02_Antonio_Rey_Loot.mp3" },
    { title: "Canción 3: Rioseras Tormenta", file: "pistas_audio/03_Rioseras_Tormenta.mp3" },
    { title: "Canción 4: Murciano Pro Kills", file: "pistas_audio/04_Murciano_Pro_Kills.mp3" },
    { title: "Canción 5: La Patrulla Canina", file: "pistas_audio/05_La_Patrulla_Canina.mp3" },
    { title: "Canción 6: Rioseras Tormenta", file: "pistas_audio/06_Rioseras_Tormenta.mp3" },
    { title: "Canción 7: Pisos Picados", file: "pistas_audio/07_Pisos_Picados.mp3" },
    { title: "Canción 8: Baile de la Victoria", file: "pistas_audio/08_Baile_Victoria.mp3" },
    { title: "Canción 9: Medikit para el Alma", file: "pistas_audio/09_Medikit_Alma.mp3" },
    { title: "Canción 10: Salto del Comandante", file: "pistas_audio/10_Salto_Gerbi.mp3" },
    { title: "Canción 11: Victoria Magistral", file: "pistas_audio/11_Victoria_Magistral.mp3" },
    { title: "Canción 12: GG Patrulla", file: "pistas_audio/12_GG_Patrulla.mp3" }
    


];

let currentSong = 0;
const player = document.getElementById("player");
const playlistEl = document.getElementById("playlist");

// Cargar lista en HTML
songs.forEach((song, index) => {
    const li = document.createElement("li");
    li.textContent = song.title;
    li.style.cursor = "pointer";
    li.onclick = () => loadSong(index, true);
    playlistEl.appendChild(li);
});

// Cargar canción
function loadSong(index, autoplay = false) {
    if (index < 0) index = songs.length - 1;
    if (index >= songs.length) index = 0;
    currentSong = index;
    player.src = songs[currentSong].file;
    if (autoplay) player.play();
}

// Reproducir / Pausar
function playPause() {
    if (player.paused) {
        player.play();
    } else {
        player.pause();
    }
}

// Canción anterior
function prevSong() {
    loadSong(currentSong - 1, true);
}

// Canción siguiente
function nextSong() {
    loadSong(currentSong + 1, true);
}

// Pasar automáticamente a la siguiente
player.addEventListener("ended", nextSong);

// Cargar la primera canción al iniciar
loadSong(currentSong);
</script>
